# ═══════════════════════════════════════════════════
# RunGoal Nginx 配置
# ═══════════════════════════════════════════════════
#
# 使用方法（1Panel 环境）：
#
# 方式 A — 在 1Panel 网站设置中操作（推荐）：
#   1. 1Panel → 网站 → 创建网站，根目录设为 /opt/rungoal/apps/web/dist
#   2. 进入网站配置 → 反向代理 → 添加：
#      名称：rungoal-api
#      目标URL：http://127.0.0.1:3000
#      代理路径：/api
#   3. 进入网站配置 → 配置文件，在 server 块内追加下方 Admin 配置
#
# 方式 B — 直接放到 Nginx 配置目录：
#   cp deploy/nginx.conf /etc/nginx/conf.d/rungoal.conf
#   然后修改 server_name 为你的域名/IP
#   nginx -t && systemctl reload nginx
#
# ═══════════════════════════════════════════════════

server {
    listen 80;
    server_name _;  # 替换为你的域名，如 rungoal.example.com；用 _ 表示匹配所有

    # ─── C 端 H5 前端（SPA） ───
    location / {
        root /opt/rungoal/apps/web/dist;
        try_files $uri $uri/ /index.html;

        # 静态资源缓存
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            root /opt/rungoal/apps/web/dist;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # ─── Admin 后台前端（SPA，子路径） ───
    location /admin {
        alias /opt/rungoal/apps/admin/dist;
        try_files $uri $uri/ /admin/index.html;

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            alias /opt/rungoal/apps/admin/dist;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # ─── API 反向代理 ───
    location /api {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # ─── gzip 压缩 ───
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1024;
    gzip_comp_level 6;
}
